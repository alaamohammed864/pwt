<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>شجرة مستودع GitHub - نسخة مصححة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-glass: rgba(15, 23, 42, 0.75);
    --border-glass: rgba(255, 255, 255, 0.15);
    --accent: #4ade80;
    --font-main: 'Cairo', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

  body {
    background-color: #0f172a; /* لون احتياطي */
    color: #f8fafc;
    font-family: var(--font-main);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* طبقة الواجهة */
  .ui-layer {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  header {
    align-self: center;
    background: var(--bg-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 12px 24px;
    border-radius: 16px;
    border: 1px solid var(--border-glass);
    text-align: center;
    pointer-events: auto;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    max-width: 90%;
  }

  header h1 { font-size: 20px; margin-bottom: 4px; background: linear-gradient(to right, #4ade80, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { font-size: 12px; color: #cbd5e1; }

  .controls {
    align-self: flex-end;
    display: flex;
    gap: 10px;
    pointer-events: auto;
  }

  .btn-group {
    display: flex; gap: 5px;
    background: var(--bg-glass); padding: 5px; border-radius: 10px; border: 1px solid var(--border-glass);
  }

  button {
    background: transparent; border: none; color: #fff; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s;
  }
  button:hover { background: rgba(255,255,255,0.1); color: var(--accent); }

  input#search {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); color: #fff; padding: 6px 12px; border-radius: 6px; font-family: inherit; width: 160px; outline: none;
  }
  input#search:focus { border-color: var(--accent); }

  /* الكانفاس */
  canvas {
    position: absolute;
    top: 0; left: 0;
    display: block;
    cursor: grab;
    touch-action: none;
  }
  canvas:active { cursor: grabbing; }

  /* التلميح */
  #tooltip {
    position: fixed;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid var(--accent);
    padding: 10px;
    border-radius: 8px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 20;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    font-size: 13px;
    width: max-content;
    max-width: 220px;
  }
  #tooltip strong { color: #fff; display: block; margin-bottom: 4px; font-size: 14px; }
  #tooltip .meta { color: #94a3b8; font-size: 11px; display: flex; justify-content: space-between; margin-bottom: 6px; }
  #tooltip .ext-badge { background: var(--accent); color: #000; padding: 1px 5px; border-radius: 4px; font-weight: bold; }
  #tooltip a { display: block; background: var(--accent); color: #000; text-align: center; padding: 4px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 11px; }

  .footer-info {
    position: absolute; bottom: 10px; left: 20px; color: rgba(255,255,255,0.3); font-size: 10px; pointer-events: none;
  }
</style>
</head>
<body>

<div class="ui-layer">
  <header>
    <h1>GitHub Repository Tree</h1>
    <p>🌳 حرك الماوس للتصفح · اسحب للتنقل · استخدم العجلة للتكبير</p>
  </header>

  <div class="controls" style="margin-top: auto; margin-bottom: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
    <input type="text" id="search" placeholder="بحث عن ملف...">
    <div class="btn-group">
      <button onclick="app.resetView()" title="إعادة ضبط">⟲</button>
      <button onclick="app.toggleTheme()" title="الوضع الليلي/النهاري">◑</button>
      <button onclick="app.snapshot()" title="حفظ صورة">📷</button>
    </div>
  </div>
</div>

<div id="tooltip"></div>
<div class="footer-info">Developed by AI Assistant</div>
<canvas id="canvas"></canvas>

<script>
/**
 * GitHub Repository Tree Visualization - FIXED VERSION
 * تعديلات رئيسية: إصلاح نظام الإحداثيات، تحديث DPI، معالجة التكبير
 */

const REPO_URL = 'https://github.com/YOUR_USERNAME/YOUR_REPO/blob/main/';

// قائمة الملفات (بيانات وهمية للتجربة)
const FILES_DATA = [
  'index.html', 'style.css', 'main.js', 'README.md', 'app.py', 
  'package.json', 'webpack.config.js', '.gitignore', 'components/Header.jsx',
  'components/Footer.jsx', 'utils/helpers.js', 'api/routes.js', 'db/schema.sql',
  'docker-compose.yml', 'Dockerfile', '.env.example', 'tests/unit.test.js',
  'assets/logo.png', 'public/favicon.ico', 'LICENSE', 'Makefile', 'tsconfig.json',
  'src/index.ts', 'src/App.tsx', 'server.js', 'middleware/auth.js'
].map(name => {
  const ext = name.split('.').pop().toLowerCase();
  const colors = {html:'#e34c26', css:'#563d7c', js:'#f1e05a', json:'#cb171e', py:'#3572A5', ts:'#2b7489', md:'#083fa1', yml:'#cb171e', sh:'#89e051', docker:'#384d54'};
  return {
    name, 
    ext: ext.toUpperCase(),
    color: colors[ext] || '#8b949e',
    size: (Math.random()*50 + 1).toFixed(1) + ' KB'
  };
});

class TreeApp {
  constructor() {
    this.canvas = document.getElementById('canvas');
    this.ctx = this.canvas.getContext('2d', { alpha: false }); // أداء أفضل
    this.width = window.innerWidth;
    this.height = window.innerHeight;
    
    // حالة التطبيق
    this.camera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
    this.isDragging = false;
    this.lastMouse = { x: 0, y: 0 };
    this.mouseWorld = { x: 0, y: 0 }; // موقع الماوس في عالم الشجرة
    this.hoveredFruit = null;
    this.growth = 0;
    this.time = 0;
    this.isDark = true;
    this.search = '';

    // بيانات الشجرة
    this.branches = [];
    this.fruits = [];
    this.particles = []; // نجوم أو أوراق متساقطة

    this.init();
  }

  init() {
    // 1. إعداد الأحداث
    window.addEventListener('resize', () => this.resize());
    this.canvas.addEventListener('mousedown', e => this.onMouseDown(e));
    window.addEventListener('mouseup', () => this.isDragging = false);
    this.canvas.addEventListener('mousemove', e => this.onMouseMove(e));
    this.canvas.addEventListener('wheel', e => this.onWheel(e), { passive: false });
    this.canvas.addEventListener('click', e => this.onClick(e));
    document.getElementById('search').addEventListener('input', (e) => this.search = e.target.value.toLowerCase());

    // 2. بناء الشجرة
    this.buildTree();

    // 3. ضبط العرض الأولي
    this.resize();
    
    // ضبط الكاميرا لتكون قاعدة الشجرة في وسط الأسفل
    this.resetView();

    // 4. بدء الحلقة
    requestAnimationFrame(t => this.loop(t));
  }

  resize() {
    this.width = window.innerWidth;
    this.height = window.innerHeight;
    
    // دعم الشاشات عالية الدقة (Retina)
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = this.width * dpr;
    this.canvas.height = this.height * dpr;
    this.ctx.scale(dpr, dpr);
  }

  resetView() {
    this.camera.targetZoom = 1;
    this.camera.zoom = 1;
    // وضع نقطة (0,0) في وسط الأسفل
    this.camera.x = this.width / 2;
    this.camera.y = this.height - 100;
  }

  toggleTheme() {
    this.isDark = !this.isDark;
  }

  snapshot() {
    const link = document.createElement('a');
    link.download = 'tree-viz.png';
    link.href = this.canvas.toDataURL();
    link.click();
  }

  // بناء الشجرة بشكل إجرائي (Procedural)
  buildTree() {
    this.branches = [];
    this.fruits = [];
    
    // جذع رئيسي
    // x1,y1,x2,y2: الإحداثيات بالنسبة لنقطة (0,0) وهي قاعدة الجذع
    // في الكانفاس Y يسير للأسفل، لذا الأعلى هو Y سالب
    let stack = [{ x: 0, y: 0, len: 180, angle: -Math.PI/2, width: 25, depth: 0 }];
    
    const maxDepth = 5;
    
    while(stack.length > 0) {
      const b = stack.pop();
      
      // حساب نهاية الفرع
      const x2 = b.x + Math.cos(b.angle) * b.len;
      const y2 = b.y + Math.sin(b.angle) * b.len;
      
      // إضافة الفرع للقائمة للرسم
      this.branches.push({
        x1: b.x, y1: b.y, x2: x2, y2: y2, width: b.width
      });

      // إضافة الثمار إذا كان الفرع صغيراً
      if (b.width < 10 && this.fruits.length < FILES_DATA.length) {
        // وضع ثمرة في منتصف الفرع أو نهايته
        this.fruits.push({
          x: (b.x + x2)/2, 
          y: (b.y + y2)/2,
          r: 10 + Math.random() * 5,
          file: FILES_DATA[this.fruits.length],
          swayOffset: Math.random() * 100
        });
      }

      // إنشاء فروع جديدة إذا لم نصل للحد الأقصى
      if (b.depth < maxDepth) {
        const branchCount = 2 + Math.floor(Math.random() * 2);
        for(let i=0; i<branchCount; i++) {
          // تغيير الزاوية قليلاً
          const variance = 0.6; // تشتت الفروع
          const newAngle = b.angle + (Math.random() - 0.5) * variance;
          const newLen = b.len * (0.7 + Math.random() * 0.1);
          const newWidth = b.width * 0.7;
          const newDepth = b.depth + 1;

          stack.push({
            x: x2, y: y2,
            len: newLen,
            angle: newAngle,
            width: newWidth,
            depth: newDepth
          });
        }
      }
    }
  }

  // التعامل مع المدخلات
  onMouseDown(e) {
    this.isDragging = true;
    this.lastMouse = { x: e.clientX, y: e.clientY };
  }

  onMouseMove(e) {
    // 1. تحديث موقع الماوس للشاشة
    const mx = e.clientX;
    const my = e.clientY;

    // 2. حساب الإزاحة للكاميرا (سحب)
    if (this.isDragging) {
      const dx = mx - this.lastMouse.x;
      const dy = my - this.lastMouse.y;
      this.camera.x += dx;
      this.camera.y += dy;
      this.lastMouse = { x: mx, y: my };
    }

    // 3. تحويل إحداثيات الشاشة إلى إحداثيات العالم (World Coordinates)
    // العالم = (الشاشة - ترجمة الكاميرا) / التكبير
    this.mouseWorld.x = (mx - this.camera.x) / this.camera.zoom;
    this.mouseWorld.y = (my - this.camera.y) / this.camera.zoom;

    // 4. التحقق من التحويم (Hover Check)
    this.checkHover();
    this.updateTooltip(mx, my);
  }

  onWheel(e) {
    e.preventDefault();
    const zoomIntensity = 0.1;
    const delta = -Math.sign(e.deltaY) * zoomIntensity;
    
    // حساب التكبير الجديد
    const newZoom = Math.min(Math.max(this.camera.zoom + delta, 0.2), 3);
    
    // تحريك الكاميرا بحيث يظل الماوس فوق نفس النقطة في العالم
    // Formula: newCamPos = mouse - (mouse - oldCamPos) * (newZoom / oldZoom)
    // البسط للتنفيذ: نستخدم targetZoom للتأثير الناعم لاحقاً
    const zoomRatio = newZoom / this.camera.zoom;
    
    this.camera.x = mx - (mx - this.camera.x) * zoomRatio;
    this.camera.y = my - (my - this.camera.y) * zoomRatio;
    
    this.camera.zoom = newZoom;
  }

  onClick(e) {
    if (this.hoveredFruit) {
      window.open(REPO_URL + this.hoveredFruit.file.name, '_blank');
      // تأثير بسيط (يمكن إضافة جسيمات هنا)
    }
  }

  checkHover() {
    let found = null;
    // التحقق عكسي (من الأعلى للأسفل لرسم الترتيب الصحيح)
    for (let i = this.fruits.length - 1; i >= 0; i--) {
      const f = this.fruits[i];
      // حساب اهتزاز الثمرة الحالي لضرب الماوس بدقة
      const sway = Math.sin(this.time * 0.002 + f.swayOffset) * 3;
      const fx = f.x;
      const fy = f.y + sway; // الاهتزاز عمودي في هذا المثال

      const dist = Math.hypot(this.mouseWorld.x - fx, this.mouseWorld.y - fy);
      
      if (dist < f.r + 2) { // +2 لزيادة مساحة النقر
        found = f;
        break;
      }
    }
    
    this.hoveredFruit = found;
    this.canvas.style.cursor = found ? 'pointer' : (this.isDragging ? 'grabbing' : 'grab');
  }

  updateTooltip(mx, my) {
    const tip = document.getElementById('tooltip');
    if (this.hoveredFruit) {
      const f = this.hoveredFruit.file;
      tip.style.opacity = 1;
      tip.style.left = (mx + 15) + 'px';
      tip.style.top = (my + 15) + 'px';
      tip.innerHTML = `
        <strong>${f.name}</strong>
        <div class="meta">
          <span>${f.size}</span>
          <span class="ext-badge">${f.ext}</span>
        </div>
        <a href="${REPO_URL}${f.name}" target="_blank">فتح في GitHub</a>
      `;
      
      // منع الخروج من الشاشة
      const rect = tip.getBoundingClientRect();
      if (rect.right > window.innerWidth) tip.style.left = (mx - rect.width - 10) + 'px';
      if (rect.bottom > window.innerHeight) tip.style.top = (my - rect.height - 10) + 'px';
      
    } else {
      tip.style.opacity = 0;
    }
  }

  // حلقة الرسم
  loop(t) {
    this.time = t;
    // تحريك النمو تدريجياً
    if(this.growth < 1) this.growth += (1 - this.growth) * 0.05;

    // 1. مسح الخلفية
    this.ctx.fillStyle = this.isDark ? '#0f172a' : '#e0f2fe';
    this.ctx.fillRect(0, 0, this.width, this.height);

    // 2. تطبيق تحويلات الكاميرا
    this.ctx.save();
    this.ctx.translate(this.camera.x, this.camera.y);
    this.ctx.scale(this.camera.zoom, this.camera.zoom);

    // رسم الأرضية (بيضاوي عند 0,0)
    this.ctx.fillStyle = this.isDark ? '#064e3b' : '#4ade80';
    this.ctx.beginPath();
    this.ctx.ellipse(0, 0, 120, 40, 0, 0, Math.PI * 2);
    this.ctx.fill();

    // تطبيق النمو للشجرة
    this.ctx.scale(this.growth, this.growth);

    // رسم الفروع
    this.ctx.lineCap = 'round';
    this.branches.forEach(b => {
      this.ctx.lineWidth = b.width;
      this.ctx.strokeStyle = this.isDark ? '#78350f' : '#92400e';
      this.ctx.beginPath();
      this.ctx.moveTo(b.x1, b.y1);
      this.ctx.lineTo(b.x2, b.y2);
      this.ctx.stroke();
    });

    // رسم الثمار
    this.fruits.forEach(f => {
      const isMatch = f.file.name.toLowerCase().includes(this.search);
      const opacity = (this.search && !isMatch) ? 0.1 : 1;
      
      if (opacity < 0.2) return;

      const isHover = (this.hoveredFruit === f);
      const sway = Math.sin(t * 0.002 + f.swayOffset) * 3;

      this.ctx.globalAlpha = opacity;

      // الظل/التوهج عند التحويم
      if (isHover) {
        this.ctx.shadowColor = f.file.color;
        this.ctx.shadowBlur = 15;
      }

      this.ctx.fillStyle = f.file.color;
      this.ctx.beginPath();
      this.ctx.arc(f.x, f.y + sway, isHover ? f.r * 1.15 : f.r, 0, Math.PI * 2);
      this.ctx.fill();
      
      // لمعة
      this.ctx.fillStyle = 'rgba(255,255,255,0.4)';
      this.ctx.beginPath();
      this.ctx.arc(f.x - f.r*0.3, f.y + sway - f.r*0.3, f.r*0.25, 0, Math.PI*2);
      this.ctx.fill();
      
      this.ctx.shadowBlur = 0;
      this.ctx.globalAlpha = 1;
    });

    this.ctx.restore(); // إنهاء تأثير الكاميرا

    requestAnimationFrame(t => this.loop(t));
  }
}

// تشغيل التطبيق
const app = new TreeApp();
window.app = app; // للوصول من الأزرار

</script>
</body>
</html>
