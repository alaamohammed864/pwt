<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌳 PTW 3D Galactic Tree | الإبداع المتجدد</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
        }
        /* لوحة التحكم العلوية - شفافة ومتطورة */
        .controls {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 12px 20px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            margin: 0 auto;
            width: fit-content;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        .controls button, .controls input, .controls select {
            background: rgba(20,20,30,0.9);
            border: 1px solid #ffd966;
            color: #ffefc0;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }
        .controls input {
            background: rgba(0,0,0,0.7);
            min-width: 200px;
        }
        .controls button:hover {
            background: #ffaa33;
            color: #000;
            border-color: white;
            transform: scale(1.02);
        }
        .stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 20px;
            color: #ffd966;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        #tooltip3d {
            position: absolute;
            background: #000000cc;
            backdrop-filter: blur(8px);
            color: #ffecb3;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 14px;
            border-right: 3px solid gold;
            pointer-events: none;
            z-index: 200;
            font-weight: bold;
            white-space: nowrap;
            font-family: monospace;
            transition: 0.05s linear;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        @media (max-width: 700px) {
            .controls button, .controls input { padding: 5px 10px; font-size: 10px; }
            .controls input { min-width: 130px; }
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #aaa;
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 16px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن ملف... (hot, cold, ai, ptw)">
        <select id="typeFilter">
            <option value="all">🌿 الكل</option>
            <option value="hot">🔥 Hot Work</option>
            <option value="cold">❄️ Cold Work</option>
            <option value="ai">🧠 AI Prototype</option>
            <option value="ptw">📋 PTW Roadmap</option>
            <option value="proto">⚙️ Prototype</option>
        </select>
        <button id="resetBtn">⟳ إعادة ضبط</button>
        <button id="fullscreenBtn">⛶ ملء الشاشة</button>
        <button id="exportBtn">📥 تصدير القائمة</button>
    </div>
    <div class="stats" id="statsPanel">📁 إجمالي: 27 | 🔍 ظاهر: 27</div>
    <div id="tooltip3d" style="display: none;"></div>
    <div class="instruction">🖱️ اسحب لتدوير الكاميرا | اضغط على الثمرة لفتح الملف</div>

    <!-- استيراد Three.js والمكتبات المساعدة -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ------------------- إعداد المشهد -------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020210);
        scene.fog = new THREE.FogExp2(0x020210, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // ظلال واقعية
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // CSS2D للنصوص (تظهر دائماً أمام الكاميرا)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // تحكم بالكاميرا
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 2.5, 0);
        
        // ------------------- الإضاءة السحرية -------------------
        // ضوء محيط ناعم
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        // ضوء اتجاهي رئيسي
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(3, 8, 2);
        dirLight.castShadow = true;
        dirLight.receiveShadow = false;
        dirLight.shadow.mapSize.width = 1024;
        scene.add(dirLight);
        // ضوء خلفي أزرق
        const backLight = new THREE.PointLight(0x2266ff, 0.5);
        backLight.position.set(-2, 3, -4);
        scene.add(backLight);
        // ضوء متحرك (لهب سحري)
        const magicLight = new THREE.PointLight(0xffaa44, 0.8);
        magicLight.position.set(0, 2, 1);
        scene.add(magicLight);
        
        // جزيئات متوهجة في الخلفية (نجوم متحركة)
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1200;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 80;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // ------------------- بناء الشجرة ثلاثية الأبعاد -------------------
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6b3e1a, roughness: 0.7, metalness: 0.2 });
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 1.1, 2.2, 12), trunkMat);
        trunk.position.y = 0.8;
        trunk.castShadow = true;
        trunk.receiveShadow = false;
        scene.add(trunk);
        
        // تاج الشجرة - عدة كرات متداخلة مع أوراق شفافة
        const foliageMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.4, emissive: 0x1a4d1a, emissiveIntensity: 0.2 });
        const foliage1 = new THREE.Mesh(new THREE.SphereGeometry(1.1, 16, 16), foliageMat);
        foliage1.position.y = 1.8;
        foliage1.castShadow = true;
        const foliage2 = new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 16), foliageMat);
        foliage2.position.y = 2.6;
        foliage2.castShadow = true;
        const foliage3 = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), foliageMat);
        foliage3.position.y = 3.3;
        foliage3.castShadow = true;
        scene.add(foliage1, foliage2, foliage3);
        
        // أوراق صغيرة متفرقة (جزيئات خضراء)
        const leafParticles = new THREE.BufferGeometry();
        const leafCount = 800;
        const leafPositions = new Float32Array(leafCount * 3);
        for (let i = 0; i < leafCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 1.2 + Math.random() * 1.8;
            leafPositions[i*3] = Math.sin(phi) * Math.cos(theta) * r;
            leafPositions[i*3+1] = 1.5 + Math.sin(phi) * Math.sin(theta) * r + Math.random() * 1.2;
            leafPositions[i*3+2] = Math.cos(phi) * r;
        }
        leafParticles.setAttribute('position', new THREE.BufferAttribute(leafPositions, 3));
        const leafPointMat = new THREE.PointsMaterial({ color: 0x88ff88, size: 0.05, transparent: true });
        const leafPoints = new THREE.Points(leafParticles, leafPointMat);
        scene.add(leafPoints);
        
        // ------------------- بيانات الملفات (الثمار) -------------------
        const filesData = [
            { name: 'hot-work-permit-basic-v1.html', type: 'hot', desc: 'تصريح عمل ساخن أساسي', color: 0xff6666, size: '45KB' },
            { name: 'hot-work-react-spa-v2.html', type: 'hot', desc: 'واجهة React للعمل الساخن', color: 0xff6666, size: '120KB' },
            { name: 'hot-work-offline-v3.html', type: 'hot', desc: 'نسخة تعمل بدون إنترنت', color: 0xff6666, size: '180KB' },
            { name: 'cold-work-dashboard-v4.html', type: 'cold', desc: 'لوحة تحكم متقدمة', color: 0x66aaff, size: '200KB' },
            { name: 'cold-work-rtl-v2.html', type: 'cold', desc: 'دعم RTL محسن', color: 0x66aaff, size: '95KB' },
            { name: 'ptw-roadmap-v1.html', type: 'ptw', desc: 'خارطة طريق PTW', color: 0xcc88ff, size: '60KB' },
            { name: 'ai-refinery-control-v4.html', type: 'ai', desc: 'تحكم ذكي بمصفاة', color: 0xffcc44, size: '310KB' },
            { name: 'ai-role-based-cold.html', type: 'ai', desc: 'صلاحيات متعددة للعمل البارد', color: 0xffcc44, size: '145KB' },
            { name: 'ai-approval-flow.html', type: 'ai', desc: 'مسار اعتماد متعدد الأدوار', color: 0xffcc44, size: '165KB' },
            { name: 'ai-dark-3d-hwp.html', type: 'ai', desc: 'واجهة صناعية ثلاثية الأبعاد', color: 0xffcc44, size: '220KB' },
            { name: 'ai-cold-simple-bilingual.html', type: 'ai', desc: 'نموذج بسيط ثنائي اللغة', color: 0xffcc44, size: '88KB' },
            { name: 'ai-zfd-cold-pro.html', type: 'ai', desc: 'ZFD احترافي', color: 0xffcc44, size: '175KB' },
            { name: 'ai-cert-gas-log.html', type: 'ai', desc: 'شهادات وسجل الغاز', color: 0xffcc44, size: '130KB' },
            { name: 'ai-master-cert-ppe.html', type: 'ai', desc: 'مصفوفة PPE', color: 0xffcc44, size: '155KB' },
            { name: 'ai-upload-risk-matrix.html', type: 'ai', desc: 'رفع ملفات + مصفوفة مخاطر', color: 0xffcc44, size: '190KB' },
            { name: 'ai-cold-3d-viewer.html', type: 'ai', desc: 'عارض ثلاثي الأبعاد', color: 0xffcc44, size: '245KB' },
            { name: 'ai-hot-rtl-arabic.html', type: 'ai', desc: 'عربي RTL', color: 0xffcc44, size: '100KB' },
            { name: 'ai-workflow-qr.html', type: 'ai', desc: 'سير العمل مع QR', color: 0xffcc44, size: '140KB' },
            { name: 'proto-simple-stamp.html', type: 'proto', desc: 'ختم صناعي بسيط', color: 0x66ff88, size: '75KB' },
            { name: 'proto-hard-edges-gas.html', type: 'proto', desc: 'تحقق الغاز بحواف حادة', color: 0x66ff88, size: '110KB' },
            { name: 'proto-3d-sparks.html', type: 'proto', desc: 'خلفية شرارات', color: 0x66ff88, size: '135KB' },
            { name: 'proto-hse-dark-voice.html', type: 'proto', desc: 'HDE داكن بالصوت', color: 0x66ff88, size: '195KB' },
            { name: 'proto-sidebar-manager.html', type: 'proto', desc: 'مدير ملفات جانبي', color: 0x66ff88, size: '160KB' },
            { name: 'proto-comprehensive-100.html', type: 'proto', desc: 'نموذج شامل', color: 0x66ff88, size: '420KB' },
            { name: 'proto-signature-pads.html', type: 'proto', desc: 'لوحات توقيع', color: 0x66ff88, size: '185KB' },
            { name: 'proto-5x5-audit.html', type: 'proto', desc: 'مصفوفة 5x5 وتدقيق', color: 0x66ff88, size: '145KB' },
            { name: 'proto-a4-print.html', type: 'proto', desc: 'طباعة A4 محسنة', color: 0x66ff88, size: '90KB' }
        ];
        
        // إضافة بعض الملفات الإضافية ليصبح العدد 27+ (بالفعل 27)
        // ------------------- إنشاء الثمار كمجالات ثلاثية الأبعاد -------------------
        const fruitsGroup = [];
        const fruitMeshes = []; // لتخزين الكائنات للتفاعل
        
        // مواقع دائرية حلزونية حول الشجرة
        const angles = [0, 0.8, 1.6, 2.3, 3.0, 3.7, 4.4, 5.1, 5.8, 0.5, 1.2, 1.9, 2.6, 3.3, 4.0, 4.7, 5.4, 6.0, 0.3, 1.0, 1.7, 2.4, 3.1, 3.8, 4.5, 5.2, 5.9];
        const radii = [1.2, 1.5, 1.8, 2.0, 2.2, 2.1, 1.9, 1.7, 1.4, 1.6, 1.9, 2.1, 2.3, 2.0, 1.8, 1.5, 1.3, 1.1, 1.4, 1.7, 2.0, 2.2, 1.9, 1.6, 1.3, 1.0, 1.2];
        const heights = [1.0, 1.3, 1.7, 2.0, 2.4, 2.7, 3.0, 3.2, 3.4, 1.5, 1.9, 2.3, 2.6, 2.9, 3.1, 3.3, 3.5, 3.6, 1.2, 1.6, 2.0, 2.4, 2.8, 3.0, 3.2, 3.4, 3.7];
        
        // إنشاء CSS2D labels
        const labelDivs = [];
        
        filesData.forEach((file, idx) => {
            const angle = angles[idx % angles.length];
            const radius = radii[idx % radii.length];
            const yPos = heights[idx % heights.length];
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            // كرة الثمرة
            const geometry = new THREE.SphereGeometry(0.32, 24, 24);
            const material = new THREE.MeshStandardMaterial({
                color: file.color,
                emissive: 0x442200,
                emissiveIntensity: 0.3,
                roughness: 0.2,
                metalness: 0.7
            });
            const fruit = new THREE.Mesh(geometry, material);
            fruit.position.set(x, yPos, z);
            fruit.userData = { file, idx };
            fruit.castShadow = true;
            scene.add(fruit);
            
            // إضافة حلقة متوهجة حول الثمرة
            const glowMat = new THREE.MeshBasicMaterial({ color: file.color, transparent: true, opacity: 0.25 });
            const glowRing = new THREE.Mesh(new THREE.SphereGeometry(0.42, 16, 16), glowMat);
            fruit.add(glowRing);
            
            // إضافة نص CSS2D
            const div = document.createElement('div');
            div.textContent = file.name.substring(0, 18) + (file.name.length > 18 ? '…' : '');
            div.style.color = '#ffefb9';
            div.style.fontSize = '10px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 0px black';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 6px';
            div.style.borderRadius = '20px';
            div.style.border = `1px solid ${new THREE.Color(file.color).getStyle()}`;
            div.style.whiteSpace = 'nowrap';
            div.style.fontFamily = 'monospace';
            const labelObj = new CSS2DObject(div);
            labelObj.position.set(x, yPos + 0.45, z);
            scene.add(labelObj);
            
            fruitMeshes.push({ mesh: fruit, label: labelObj, file, idx });
        });
        
        // ------------------- تأثير الجسيمات المتطايرة حول الثمار -------------------
        const particleField = new THREE.BufferGeometry();
        const particleCount = 1500;
        const particlePos = [];
        for (let i = 0; i < particleCount; i++) {
            particlePos.push((Math.random() - 0.5) * 12);
            particlePos.push((Math.random() - 0.5) * 5 + 2);
            particlePos.push((Math.random() - 0.5) * 12);
        }
        particleField.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlePos), 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.03, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particleField, particleMat);
        scene.add(particles);
        
        // ------------------- منطق البحث والفلترة -------------------
        const searchInput = document.getElementById('searchInput');
        const typeFilter = document.getElementById('typeFilter');
        const resetBtn = document.getElementById('resetBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const exportBtn = document.getElementById('exportBtn');
        const statsSpan = document.getElementById('statsPanel');
        
        function updateVisibility() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            const typeVal = typeFilter.value;
            let visibleCount = 0;
            fruitMeshes.forEach(item => {
                const fileName = item.file.name.toLowerCase();
                const matchSearch = searchTerm === '' || fileName.includes(searchTerm);
                const matchType = typeVal === 'all' || item.file.type === typeVal;
                const visible = matchSearch && matchType;
                item.mesh.visible = visible;
                item.label.visible = visible;
                if (visible) visibleCount++;
            });
            statsSpan.innerHTML = `📁 إجمالي: ${filesData.length} | 🔍 ظاهر: ${visibleCount}`;
        }
        
        searchInput.addEventListener('input', updateVisibility);
        typeFilter.addEventListener('change', updateVisibility);
        resetBtn.addEventListener('click', () => {
            searchInput.value = '';
            typeFilter.value = 'all';
            updateVisibility();
        });
        fullscreenBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        });
        exportBtn.addEventListener('click', () => {
            const visibleFiles = fruitMeshes.filter(f => f.mesh.visible).map(f => f.file.name);
            const blob = new Blob([JSON.stringify(visibleFiles, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ptw_visible_files.json';
            a.click();
            URL.revokeObjectURL(url);
        });
        
        // ------------------- التفاعل: Raycaster للنقر وإظهار التلميحات -------------------
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltipDiv = document.getElementById('tooltip3d');
        
        function onMouseClick(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(fruitMeshes.map(f => f.mesh));
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const fileData = hit.userData.file;
                const url = `https://github.com/YOUR_USERNAME/YOUR_REPO/blob/main/${fileData.name}`; // استبدل بالرابط الحقيقي
                window.open(url, '_blank');
                // تأثير انفجار جسيمات لحظي
                const sparkGeo = new THREE.BufferGeometry();
                const sparkPos = [];
                for (let i=0; i<30; i++) {
                    sparkPos.push((Math.random() - 0.5) * 0.8);
                    sparkPos.push((Math.random() - 0.5) * 0.8);
                    sparkPos.push((Math.random() - 0.5) * 0.8);
                }
                sparkGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(sparkPos), 3));
                const sparkMat = new THREE.PointsMaterial({ color: 0xffaa44, size: 0.05 });
                const sparks = new THREE.Points(sparkGeo, sparkMat);
                hit.add(sparks);
                setTimeout(() => hit.remove(sparks), 200);
            }
        }
        
        function onMouseMove(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(fruitMeshes.map(f => f.mesh));
            if (intersects.length > 0) {
                const hitFile = intersects[0].object.userData.file;
                tooltipDiv.style.display = 'block';
                tooltipDiv.style.left = (event.clientX + 15) + 'px';
                tooltipDiv.style.top = (event.clientY - 30) + 'px';
                tooltipDiv.innerHTML = `📄 ${hitFile.name}<br>📦 ${hitFile.size} | ${hitFile.desc}`;
                document.body.style.cursor = 'pointer';
            } else {
                tooltipDiv.style.display = 'none';
                document.body.style.cursor = 'auto';
            }
        }
        
        window.addEventListener('click', onMouseClick, false);
        window.addEventListener('mousemove', onMouseMove, false);
        
        // ------------------- حلقة الرسوم المتحركة -------------------
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            // تحريك الأضواء السحرية
            magicLight.intensity = 0.7 + Math.sin(time * 3) * 0.3;
            magicLight.position.x = Math.sin(time) * 1.2;
            magicLight.position.z = Math.cos(time * 0.9) * 1.2;
            // دوران الجزيئات والنجوم البطيء
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            particles.rotation.y += 0.002;
            leafPoints.rotation.y += 0.001;
            // اهتزاز خفيف للثمار (تأثير حيوي)
            fruitMeshes.forEach((item, i) => {
                const offset = Math.sin(time * 2 + i) * 0.008;
                item.mesh.position.y += offset * 0.05;
            });
            
            controls.update(); // تحديث OrbitControls
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        updateVisibility();
        
        // تحسين استجابة النافذة
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // مؤثر ترحيبي: دوران الكاميرا لطيف
        setTimeout(() => {
            controls.autoRotate = true;
            setTimeout(() => { controls.autoRotate = false; }, 3000);
        }, 500);
        
        console.log('✨ الشجرة الثلاثية الأبعاد جاهزة - إبداع بلا حدود ✨');
    </script>
</body>
</html>
